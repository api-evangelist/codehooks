naftiko: 1.0.0-alpha2
info:
  label: Codehooks Database REST API — Queue
  description: 'Codehooks Database REST API — Queue. 1 operations. Lead operation: Codehooks Enqueue a job. Self-contained
    Naftiko capability covering one Codehooks business surface.'
  tags:
  - Codehooks
  - Queue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CODEHOOKS_API_KEY: CODEHOOKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: database-rest-queue
    baseUri: https://{projectId}.api.codehooks.io/{space}
    description: Codehooks Database REST API — Queue business capability. Self-contained, no shared references.
    resources:
    - name: queue-topic
      path: /queue/{topic}
      operations:
      - name: enqueuejob
        method: POST
        description: Codehooks Enqueue a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topic
          in: path
          type: string
          description: The queue topic name to add the job to
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CODEHOOKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: database-rest-queue-rest
    port: 8080
    description: REST adapter for Codehooks Database REST API — Queue. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/queue/{topic}
      name: queue-topic
      description: REST surface for queue-topic.
      operations:
      - method: POST
        name: enqueuejob
        description: Codehooks Enqueue a job
        call: database-rest-queue.enqueuejob
        with:
          topic: rest.topic
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: database-rest-queue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Codehooks Database REST API — Queue. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: codehooks-enqueue-job
      description: Codehooks Enqueue a job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: database-rest-queue.enqueuejob
      with:
        topic: tools.topic
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
