        idempotent: true
      call: database-rest-documents.countdocuments
      with:
        collection: tools.collection
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
    - name: codehooks-get-document-id
      description: Codehooks Get a document by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: database-rest-documents.getdocument
      with:
        collection: tools.collection
